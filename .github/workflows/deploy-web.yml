name: Deploy Web

on:
  push:
    branches:
      - main
      - master
    paths:
      - "apps/api/**"
      - "apps/web/**"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch:

concurrency:
  group: deploy-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Prepare deploy bundle
        run: |
          mkdir -p .next/standalone/.next
          cp -R .next/static .next/standalone/.next/static

          if [ -d public ]; then
            cp -R public .next/standalone/public
          fi

          tar -czf release.tar.gz -C .next/standalone .

      - name: Prepare API bundle
        run: |
          tar -czf ../../api-release.tar.gz -C ../api .

      - name: Upload web bundle to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_SSH_PORT }}
          username: ${{ secrets.DEPLOY_USERNAME }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          source: apps/web/release.tar.gz
          target: ${{ secrets.DEPLOY_PATH }}/incoming
          strip_components: 2
          overwrite: true

      - name: Upload API bundle to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_SSH_PORT }}
          username: ${{ secrets.DEPLOY_USERNAME }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          source: api-release.tar.gz
          target: ${{ secrets.DEPLOY_PATH }}/incoming
          overwrite: true

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          API_PORT: ${{ secrets.API_PORT }}
          WEB_PORT: ${{ secrets.WEB_PORT }}
          HEALTHCHECK_URL: ${{ secrets.HEALTHCHECK_URL }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_SSH_PORT }}
          username: ${{ secrets.DEPLOY_USERNAME }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          envs: DEPLOY_PATH,API_PORT,WEB_PORT,HEALTHCHECK_URL
          script: |
            set -eu

            APP_DIR="$DEPLOY_PATH"
            RELEASE_DIR="$APP_DIR/releases/${{ github.sha }}"
            CURRENT_LINK="$APP_DIR/current"
            ARCHIVE_DIR="$APP_DIR/incoming"
            WEB_ARCHIVE_PATH="$ARCHIVE_DIR/release.tar.gz"
            API_ARCHIVE_PATH="$ARCHIVE_DIR/api-release.tar.gz"
            CHECK_URL="${HEALTHCHECK_URL:-}"
            WEB_CONTAINER="winlong-web"
            API_CONTAINER="winlong-api"
            DOCKER_NETWORK="winlong-net"
            API_PORT="${API_PORT:-8001}"

            if [ -z "$CHECK_URL" ]; then
              CHECK_URL="http://127.0.0.1:${WEB_PORT}/status"
            fi

            if ! command -v docker >/dev/null 2>&1; then
              echo "docker is not installed on the server. Install it first, then rerun this workflow."
              exit 1
            fi

            mkdir -p "$APP_DIR" "$ARCHIVE_DIR" "$APP_DIR/data"

            if [ ! -f "$WEB_ARCHIVE_PATH" ]; then
              echo "Web deploy bundle not found: $WEB_ARCHIVE_PATH"
              ls -la "$ARCHIVE_DIR" || true
              exit 1
            fi

            if [ ! -f "$API_ARCHIVE_PATH" ]; then
              echo "API deploy bundle not found: $API_ARCHIVE_PATH"
              ls -la "$ARCHIVE_DIR" || true
              exit 1
            fi

            mkdir -p "$RELEASE_DIR/web" "$RELEASE_DIR/api"
            tar -xzf "$WEB_ARCHIVE_PATH" -C "$RELEASE_DIR/web"
            tar -xzf "$API_ARCHIVE_PATH" -C "$RELEASE_DIR/api"

            cat > "$RELEASE_DIR/web/.env.production" <<EOF
            NODE_ENV=production
            HOSTNAME=0.0.0.0
            PORT=$WEB_PORT
            API_BASE_URL=http://$API_CONTAINER:$API_PORT
            EOF

            ln -sfn "$RELEASE_DIR" "$CURRENT_LINK"

            if ! docker network inspect "$DOCKER_NETWORK" >/dev/null 2>&1; then
              docker network create "$DOCKER_NETWORK"
            fi

            if docker ps -a --format '{{.Names}}' | grep -Fx "$API_CONTAINER" >/dev/null 2>&1; then
              docker rm -f "$API_CONTAINER"
            fi

            docker run -d \
              --name "$API_CONTAINER" \
              --restart unless-stopped \
              --network "$DOCKER_NETWORK" \
              -p 127.0.0.1:${API_PORT}:${API_PORT} \
              -e WINLONG_DB_PATH=/data/winlong.db \
              -e WINLONG_ALLOWED_ORIGINS=http://127.0.0.1:${WEB_PORT},http://localhost:${WEB_PORT} \
              -v "$APP_DIR/data:/data" \
              -v "$CURRENT_LINK/api:/app:ro" \
              -w /app \
              python:3.11-slim \
              sh -lc "cp -R /app /tmp/app && cd /tmp/app && pip install --no-cache-dir . && exec uvicorn app.main:app --host 0.0.0.0 --port ${API_PORT}"

            sleep 5
            if ! docker ps --format '{{.Names}}' | grep -Fx "$API_CONTAINER" >/dev/null 2>&1; then
              echo "API failed to start. Last 100 log lines:"
              docker logs --tail 100 "$API_CONTAINER" || true
              exit 1
            fi

            if ! curl --fail --silent --show-error --retry 15 --retry-delay 2 "http://127.0.0.1:${API_PORT}/health" > /dev/null; then
              echo "API health check failed"
              docker logs --tail 100 "$API_CONTAINER" || true
              exit 1
            fi

            if docker ps -a --format '{{.Names}}' | grep -Fx "$WEB_CONTAINER" >/dev/null 2>&1; then
              docker rm -f "$WEB_CONTAINER"
            fi

            docker run -d \
              --name "$WEB_CONTAINER" \
              --restart unless-stopped \
              --network "$DOCKER_NETWORK" \
              -p ${WEB_PORT}:${WEB_PORT} \
              --env-file "$CURRENT_LINK/web/.env.production" \
              -v "$CURRENT_LINK/web:/app:ro" \
              -w /app \
              node:22-bookworm-slim \
              node server.js

            sleep 3
            if ! docker ps --format '{{.Names}}' | grep -Fx "$WEB_CONTAINER" >/dev/null 2>&1; then
              echo "Application failed to start. Last 100 log lines:"
              docker logs --tail 100 "$WEB_CONTAINER" || true
              exit 1
            fi

            if ! curl --fail --silent --show-error --retry 5 --retry-delay 2 "$CHECK_URL" > /dev/null; then
              echo "Health check failed: $CHECK_URL"
              docker logs --tail 100 "$API_CONTAINER" || true
              docker logs --tail 100 "$WEB_CONTAINER" || true
              exit 1
            fi

            rm -f "$WEB_ARCHIVE_PATH" "$API_ARCHIVE_PATH"

            if [ -d "$APP_DIR/releases" ]; then
              cd "$APP_DIR/releases"
              ls -1dt */ 2>/dev/null | tail -n +6 | xargs -r rm -rf
            fi
