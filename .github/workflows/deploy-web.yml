name: Deploy Web

on:
  push:
    branches:
      - main
      - master
    paths:
      - "apps/web/**"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch:

concurrency:
  group: deploy-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    env:
      API_BASE_URL: ${{ secrets.API_BASE_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Prepare deploy bundle
        run: |
          mkdir -p .next/standalone/.next
          cp -R .next/static .next/standalone/.next/static

          if [ -d public ]; then
            cp -R public .next/standalone/public
          fi

          tar -czf release.tar.gz -C .next/standalone .

      - name: Upload bundle to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_SSH_PORT }}
          username: ${{ secrets.DEPLOY_USERNAME }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          source: apps/web/release.tar.gz
          target: ${{ secrets.DEPLOY_PATH }}/incoming
          strip_components: 2
          overwrite: true

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          WEB_PORT: ${{ secrets.WEB_PORT }}
          HEALTHCHECK_URL: ${{ secrets.HEALTHCHECK_URL }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_SSH_PORT }}
          username: ${{ secrets.DEPLOY_USERNAME }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          envs: DEPLOY_PATH,API_BASE_URL,WEB_PORT,HEALTHCHECK_URL
          script: |
            set -eu

            APP_DIR="$DEPLOY_PATH"
            RELEASE_DIR="$APP_DIR/releases/${{ github.sha }}"
            CURRENT_LINK="$APP_DIR/current"
            ARCHIVE_DIR="$APP_DIR/incoming"
            ARCHIVE_PATH="$ARCHIVE_DIR/release.tar.gz"
            CHECK_URL="${HEALTHCHECK_URL:-}"
            CADDY_SITE="winlong.wolongtrader.top"
            WEB_CONTAINER="winlong-web"
            CADDY_CONTAINER="winlong-caddy"
            DOCKER_NETWORK="winlong-net"

            if [ -z "$CHECK_URL" ]; then
              CHECK_URL="https://${CADDY_SITE}/status"
            fi

            if ! command -v docker >/dev/null 2>&1; then
              echo "docker is not installed on the server. Install it first, then rerun this workflow."
              exit 1
            fi

            mkdir -p "$APP_DIR" "$ARCHIVE_DIR" "$APP_DIR/caddy/data" "$APP_DIR/caddy/config"

            if [ ! -f "$ARCHIVE_PATH" ]; then
              echo "Deploy bundle not found: $ARCHIVE_PATH"
              ls -la "$ARCHIVE_DIR" || true
              exit 1
            fi

            mkdir -p "$RELEASE_DIR"
            tar -xzf "$ARCHIVE_PATH" -C "$RELEASE_DIR"

            cat > "$RELEASE_DIR/.env.production" <<EOF
            NODE_ENV=production
            HOSTNAME=0.0.0.0
            PORT=$WEB_PORT
            API_BASE_URL=$API_BASE_URL
            EOF

            mkdir -p "$APP_DIR"
            cat > "$APP_DIR/Caddyfile" <<EOF
            ${CADDY_SITE} {
              encode zstd gzip
              reverse_proxy ${WEB_CONTAINER}:${WEB_PORT}
            }
            EOF

            ln -sfn "$RELEASE_DIR" "$CURRENT_LINK"

            if ! docker network inspect "$DOCKER_NETWORK" >/dev/null 2>&1; then
              docker network create "$DOCKER_NETWORK"
            fi

            if docker ps -a --format '{{.Names}}' | grep -Fx "$WEB_CONTAINER" >/dev/null 2>&1; then
              docker rm -f "$WEB_CONTAINER"
            fi

            docker run -d \
              --name "$WEB_CONTAINER" \
              --restart unless-stopped \
              --network "$DOCKER_NETWORK" \
              --env-file "$RELEASE_DIR/.env.production" \
              -v "$RELEASE_DIR:/app:ro" \
              -w /app \
              node:22-bookworm-slim \
              node server.js

            sleep 3
            if ! docker ps --format '{{.Names}}' | grep -Fx "$WEB_CONTAINER" >/dev/null 2>&1; then
              echo "Application failed to start. Last 100 log lines:"
              docker logs --tail 100 "$WEB_CONTAINER" || true
              exit 1
            fi

            if docker ps -a --format '{{.Names}}' | grep -Fx "$CADDY_CONTAINER" >/dev/null 2>&1; then
              docker rm -f "$CADDY_CONTAINER"
            fi

            docker run -d \
              --name "$CADDY_CONTAINER" \
              --restart unless-stopped \
              --network "$DOCKER_NETWORK" \
              -p 80:80 \
              -p 443:443 \
              -v "$APP_DIR/Caddyfile:/etc/caddy/Caddyfile:ro" \
              -v "$APP_DIR/caddy/data:/data" \
              -v "$APP_DIR/caddy/config:/config" \
              caddy:2

            if ! curl --fail --silent --show-error --retry 5 --retry-delay 2 "$CHECK_URL" > /dev/null; then
              echo "Health check failed: $CHECK_URL"
              docker logs --tail 100 "$WEB_CONTAINER" || true
              docker logs --tail 100 "$CADDY_CONTAINER" || true
              exit 1
            fi

            rm -f "$ARCHIVE_PATH"

            if [ -d "$APP_DIR/releases" ]; then
              cd "$APP_DIR/releases"
              ls -1dt */ 2>/dev/null | tail -n +6 | xargs -r rm -rf
            fi
